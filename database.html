<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Database</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px 14px;
            text-align: left;
        }
        th {
            background-color: #e8e8e8;
        }
        td img {
            display: block;
            width: 64px;
            height: 64px;
            object-fit: cover;
        }
        .form-row {
            margin-bottom: 10px;
        }
        .form-row label {
            display: inline-block;
            width: 120px;
        }
        input[type="text"] {
            width: 200px;
            padding: 5px 8px;
        }
        #submit-data, #empty-table {
            padding: 8px 18px;
            margin-right: 10px;
            margin-right: 8px;
            cursor: pointer;
        }
    </style>    
</head>
<body>

    <h2>User Database</h2>   
    
    <table id="user-table">
        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Admin</th>
                <th>Image</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Webmaster</td>
                <td>example@email.com</td>
                <td>X</td>
                <td></td>
            </tr>
            <tr>
                <td>User123</td>
                <td>example@email.com</td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>AnotherUser222</td>
                <td>example@email.com</td>
                <td></td>
                <td></td>
        </tbody>
    </table>

    <button id="empty-table">Empty Table</button>

    <h3>Add / Edit User</h3>

    <form id="user-form">
        <div class="form-row">
            <label for="username">Username:</label>
            <input type="text" id="input-username" placeholder= "Enter username">
        </div>
        <div class="form-row">
            <label for="input-email">Email:</label>
            <input type="text" id="input-email" placeholder="Enter email">
        </div>
        <div class="form-row">
            <label for="input-admin">Admin:</label>
            <input type="checkbox" id="input-admin">
        </div>
        <div class="form-row">
            <label for="input-image">Image:</label>
            <input type="file" id="input-image" accept="image/*">
        </div>
        <button type="submit" id="submit-data">Submit</button>
    </form>

    <script>
        const userForm = document.getElementById('user-form');
        const userTable = document.getElementById('user-table');
        const emptyTableButton = document.getElementById('empty-table');

        userForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('input-username').value.trim();
            const email = document.getElementById('input-email').value.trim();
            const isAdmin = document.getElementById('input-admin').checked;
            const imageFile = document.getElementById('input-image').files[0];

            const adminText = isAdmin ? "X" : "-";

            const rows = userTable.tBodies[0].rows;

            for (let i = 0; i < rows.length; i++) {
                if (rows[i].cells[0].textContent === username) {
                    rows[i].cells[1].textContent = email;
                    rows[i].cells[2].textContent = adminText;

                    if (imageFile) {
                        const imageURL = URL.createObjectURL(imageFile);
                        let img = rows[i].cells[3].querySelector('img');
                        if (!img) {
                            img = document.createElement('img');
                            rows[i].cells[3].appendChild(img);
                        }
                        img.src = imageURL;
                    }
                    return;
                }
            }   

            const newRow = document.createElement('tr');

            const usernameCell = document.createElement('td');

            const emailCell = document.createElement('td');

            const adminCell = document.createElement('td');

            const imageCell = document.createElement('td');

            if (imageFile) {
                const imageURL = URL.createObjectURL(imageFile);
                const img = document.createElement('img');
                img.src = imageURL;
                img.width = 64;
                img.height = 64;
                imageCell.appendChild(img);
            }

            newRow.appendChild(usernameCell);
            newRow.appendChild(emailCell);
            newRow.appendChild(adminCell);
            newRow.appendChild(imageCell);

            userTable.tBodies[0].appendChild(newRow);
        });

        emptyTableButton.addEventListener('click', () => {
            const tbody = userTable.tBodies[0];
            while (tbody.rows.length > 0) {
                tbody.deleteRow(0);
            }
        });
    </script>

</body>
</html>
